<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#10192c">
    <title>SkyTrack</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/723/723875.png" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Use Inter for UI, JetBrains Mono for Flight Data -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
        rel="stylesheet">

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <link rel="stylesheet" href="style.css?v=1.1">
</head>

<body>
    <div class="app-container">
        <!-- Header & Search -->
        <header class="header">
            <div class="header-title">
                <h1>Live Flights</h1>
            </div>

        </header>

        <!-- Main Content Area -->
        <main class="content-area" id="flightList">
            <!-- Flight cards will be injected by app.js here -->
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="#" class="nav-item active" id="navRadar">
                <ion-icon name="airplane"></ion-icon>
                <span>Ticket</span>
            </a>
            <a href="#" class="nav-item" id="navHub">
                <ion-icon name="stats-chart"></ion-icon>
                <span>Hub</span>
            </a>
            <a href="#" class="nav-item" id="navSearch">
                <ion-icon name="search-outline"></ion-icon>
                <span>Search</span>
            </a>
            <a href="#" class="nav-item" id="navAccount">
                <ion-icon name="person-outline"></ion-icon>
                <span>Account</span>
            </a>
        </nav>
    </div>

    <!-- Flight Details Modal -->
    <div class="modal" id="detailsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Flight Details</h2>
                <button class="close-btn" id="closeModal">
                    <ion-icon name="close"></ion-icon>
                </button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Content injected via JS -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
